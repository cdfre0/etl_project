name: Build & Push ETL Images to ACR

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "Dockerfile.producer"
      - "Dockerfile.consumer"
      - "requirements.txt"
  workflow_dispatch:  # allows manual trigger from GitHub UI

env:
  ACR_LOGIN_SERVER: acretlmedallion.azurecr.io
  RESOURCE_GROUP: rg-etl-project-dev

jobs:
  build-and-push:
    name: Build & Push Producer + Consumer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Producer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.producer
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/etl-producer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Consumer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.consumer
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/etl-consumer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-container-apps:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Producer Container App
        run: |
          az containerapp update \
            --name aca-etl-producer \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/etl-producer:latest

      - name: Update Consumer Container App
        run: |
          az containerapp update \
            --name aca-etl-consumer \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/etl-consumer:latest
