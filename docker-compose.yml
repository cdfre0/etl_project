services:
  etl_agent:
    build: .
    volumes:
      - .:/workspace
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CEIDG_API_KEY=${CEIDG_API_KEY}
      - AGENT_ROLE=ETL
    command: python src/agent.py
    stdin_open: true
    tty: true
  infra_agent:
    build: .
    volumes:
      - .:/workspace
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AGENT_ROLE=INFRA
    command: python src/agent.py
    stdin_open: true
    tty: true